<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai CodeLab - Connect</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Modern Styles -->
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255,255,255,0.15);
            border-left: 1px solid rgba(255,255,255,0.05);
            padding: 4rem 3rem;
            border-radius: 30px;
            backdrop-filter: blur(30px);
            max-width: 500px;
            width: 90%;
            margin: 0 auto;
            position: relative;
            z-index: 5;
            box-shadow: 0 40px 60px rgba(0,0,0,0.4);
        }
        
        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 1.2rem;
            border-radius: 15px;
            color: var(--text-pure);
            font-family: var(--font-body);
            font-size: 1rem;
            margin-bottom: 1.5rem;
            outline: none;
            transition: 0.3s;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.4);
            background: rgba(255,255,255,0.06);
        }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-login-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            color: var(--text-pure);
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .social-login-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-5px);
        }

        .divider {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--glass-border);
        }

        .divider span {
            padding: 0 1rem;
        }

    </style>
</head>
<body>

    <!-- Custom Cursor -->
    <div id="custom-cursor"></div>

    <!-- Animated Mesh Gradient Background -->
    <div class="mesh-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Modern Extreme Navbar -->
    <nav>
        <div class="logo-container">
            <i class="fas fa-robot"></i>
            <span>CodeLab<span style="color:var(--primary)">.ai</span></span>
        </div>
        <div class="nav-links">
            <a href="index.html">Platform</a>
            <a href="courses.html">Syllabus</a>
            <a href="study.html">Resources</a>
            <a href="join.html">Community</a>
        </div>
        <div style="display:flex;gap:10px;">
            <a href="login.html" class="active magnetic-btn" style="padding: 0.5rem 1.5rem; font-size: 0.9rem;"><span>Login</span></a>
        </div>
    </nav>

    <main style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding-top: 100px;">
        <div class="login-box reveal hover-target">
            
            <div style="text-align: center; margin-bottom: 3rem;">
                <h2 style="font-size: 2.5rem;"><span class="gradient-text">Welcome Back</span></h2>
                <p style="color: var(--text-muted); margin-top: 0.5rem;">Initialize your session</p>
            </div>

            <div class="social-grid">
                <div class="social-login-btn hover-target"><i class="fab fa-google"></i></div>
                <div class="social-login-btn hover-target"><i class="fab fa-github"></i></div>
                <div class="social-login-btn hover-target"><i class="fab fa-discord"></i></div>
            </div>

            <div class="divider"><span>OR</span></div>

            <form id="eliteLoginForm">
                <input type="email" class="form-input hover-target" placeholder="Secure Email Address" required>
                <input type="password" class="form-input hover-target" placeholder="Access Token (Password)" required>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-size: 0.9rem;">
                    <label style="color: var(--text-muted); cursor: pointer;"><input type="checkbox" style="accent-color: var(--primary);"> Remember Me</label>
                    <a href="#" style="color: var(--secondary);">Recover Access</a>
                </div>

                <button type="submit" class="magnetic-btn primary hover-target" style="width: 100%; border-radius: 15px; font-size: 1.2rem; cursor: pointer; border: none;">
                    <span>Execute Login</span>
                </button>
            </form>

            <div style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">
                No clearance yet? <a href="join.html" style="color: var(--secondary); font-weight: bold;">Request Access</a>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.getElementById('eliteLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button span');
            btn.textContent = "Authenticating...";
            setTimeout(() => {
                alert("Login credentials accepted. Booting session...");
                btn.textContent = "Execute Login";
                e.target.reset();
            }, 1500);
        });
    </script>
</body>
</html>
